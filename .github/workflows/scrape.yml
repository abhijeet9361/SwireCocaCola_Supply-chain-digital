name: Daily Supply Chain Scrape

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # CRITICAL: This gives the Action permission to save the file back to your repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added feedparser and python-dotenv which were missing
          pip install requests beautifulsoup4 newspaper3k lxml_html_clean google-generativeai feedparser python-dotenv

      - name: Run Scraper
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Ensure we are adding the correct file
          git add data.json
          git commit -m "Auto-update: Latest S/4HANA & Supply Chain News" || exit 0
          git push
